[alembic]
script_location = alembic
prepend_sys_path = .
# sqlalchemy.url is set at runtime in alembic/env.py from settings.database_url.
# Leave this empty so the file itself never carries a real connection string.
sqlalchemy.url =
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
output_encoding = utf-8

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
