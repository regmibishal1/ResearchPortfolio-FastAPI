name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v

      - name: Check source punctuation is ASCII
        run: |
          if git grep -nP '[\x{2013}\x{2014}\x{2190}-\x{21FF}\x{2500}-\x{257F}]' -- 'src' 'tests' 'alembic' 'README.md'; then
            echo "Non-ASCII punctuation found in source; use plain ASCII equivalents."
            exit 1
          fi
